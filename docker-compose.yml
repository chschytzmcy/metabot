services:
  metabot:
    build: .
    restart: unless-stopped
    ports:
      - '${API_PORT:-9100}:9100'
    env_file: .env
    environment:
      - META_MEMORY_URL=http://localhost:8100
      - MEMORY_ENABLED=true
      - MEMORY_PORT=8100
      - MEMORY_DATABASE_DIR=/app/data
      - CLAUDE_EXECUTABLE_PATH=/home/etsme/.local/bin/claude
    volumes:
      - metabot-data:/app/data
      # Mount config files (excluded from image for security)
      - ./bots.json:/app/bots.json:ro
      # Mount host user home — provides claude binary, auth, and working directories
      - /home/etsme:/home/etsme
    working_dir: /app

volumes:
  metabot-data:
